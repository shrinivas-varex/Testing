name: Publish Allure Report to GitHub Pages

on:
  workflow_run:
    workflows: ["Playwright Tests with Allure Report"]
    types:
      - completed
  workflow_dispatch:

jobs:
  publish:
    name: Publish Allure Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure report artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: playwright-tests.yml
          name: allure-report-20.x
          path: allure-report
          if_no_artifact_found: warn

      - name: Check if report exists
        run: |
          if [ -d "allure-report" ] && [ "$(ls -A allure-report)" ]; then
            echo "? Allure report found"
            ls -la allure-report/
          else
            echo "?? No allure-report directory found, creating placeholder"
            mkdir -p allure-report
            echo "<h1>Test Report</h1>" > allure-report/index.html
          fi

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          force_orphan: true
