name: Playwright Tests with Allure Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 8 * * *'  # Run daily at 8 AM UTC

jobs:
  test:
    name: Run Playwright Tests
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test
        continue-on-error: true

      - name: Check test results
        if: always()
        run: |
          echo "Checking for allure-results directory..."
          if exist "allure-results" (
            dir allure-results
          ) else (
            echo "allure-results directory does not exist"
          )

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate Allure report
        if: always()
        run: |
          if exist "allure-results" (
            npx allure generate allure-results --clean -o allure-report
          ) else (
            echo "No allure-results found, creating empty report structure"
            mkdir allure-report
          )
        shell: cmd

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.node-version }}
          path: allure-results
          token: ${{ secrets.PAT_TOKEN }}
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.node-version }}
          token: ${{ secrets.PAT_TOKEN }}
          path: allure-report
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.node-version }}
          token: ${{ secrets.PAT_TOKEN }}
          path: playwright-report
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}
          token: ${{ secrets.PAT_TOKEN }}
          path: test-results
          retention-days: 30
          if-no-files-found: ignore

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Test Report
          token: ${{ secrets.PAT_TOKEN }}
          path: playwright-report/index.html
          reporter: 'java-junit'
          fail-on-error: false

      - name: Comment PR with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read test results if available
            let resultsComment = '## ? Test Execution Summary\n\n';
            resultsComment += '### Test Results\n';
            resultsComment += '- **Tests Run**: Check Allure Report\n';
            resultsComment += '- **Report**: Available in Artifacts\n\n';
            resultsComment += '### Artifacts\n';
            resultsComment += '- ?? [Allure Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) - Download from artifacts\n';
            resultsComment += '- ?? [Playwright Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) - Download from artifacts\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: resultsComment
            });

      - name: Slack notification on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "? Playwright Tests Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Playwright Test Suite Failed*\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        continue-on-error: true

      - name: Slack notification on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "? Playwright Tests Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Playwright Test Suite Passed* ?\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        continue-on-error: true
