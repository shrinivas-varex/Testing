
name: Test and Publish Report

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Tests
        run: |
          mkdir -p reports
          echo "Sample Report" > reports/report.html

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/
